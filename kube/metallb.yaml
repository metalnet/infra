apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb
  namespace: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system
  project: default
  source:
    path: kube/metallb
    repoURL: https://github.com/metalnet/infra
    targetRevision: HEAD
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
