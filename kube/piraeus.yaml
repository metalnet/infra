apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: piraeus
  namespace: argocd
spec:
  project: default
  sources:
  - repoURL: oci://ghcr.io/piraeusdatastore/piraeus-operator/piraeus
    targetRevision: 2.10.8
    chart: piraeus
    helm:
      releaseName: piraeus
      valueFiles:
      - $values/kube/piraeus/values.yaml
  - repoURL: oci://ghcr.io/piraeusdatastore/helm-charts/linstor-cluster
    targetRevision: 1.1.1
    chart: linstor-cluster
    helm:
      releaseName: linstor-cluster
  - repoURL: https://github.com/metalnet/infra.git
    targetRevision: HEAD
    ref: values
  - repoURL: https://github.com/metalnet/infra
    targetRevision: HEAD
    path: kube/piraeus
  destination:
    server: https://kubernetes.default.svc
    namespace: piraeus
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
      enabled: true
    syncOptions:
      - CreateNamespace=true

