apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: uptime-gateway
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: cloudflare-acme-issuer
spec:
  gatewayClassName: traefik
  listeners:
    - name: websecure
      protocol: HTTPS
      hostname: "uptime.kube.metalnet.org"
      port: 8443
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - name: uptime-kube-metalnet-org-tls
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: uptime-http-route
  namespace: monitoring
spec:
  parentRefs:
    - name: uptime-gateway
      namespace: monitoring
      sectionName: websecure
  hostnames:
    - "uptime.kube.metalnet.org"
  rules:
    - backendRefs:
        - name: uptimekuma
          port: 80
          kind: Service
          group: ""
      matches:
        - path:
            type: PathPrefix
            value: /
