apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uptimekuma
  namespace: argocd
spec:
  project: default
  sources:
  - repoURL: https://dirsigler.github.io/uptime-kuma-helm
    targetRevision: 4.1.0
    chart: uptime-kuma
    helm:
      releaseName: uptimekuma
      valueFiles:
      - $values/kube/monitoring/uptimekuma/values.yaml
  - repoURL: https://github.com/metalnet/infra.git
    targetRevision: HEAD
    ref: values
  - repoURL: https://github.com/metalnet/infra
    targetRevision: HEAD
    path: kube/monitoring/uptimekuma
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
      enabled: true

