apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: traefik-scrape-config
  namespace: monitoring
spec:
  jobLabel: traefik
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      honorLabels: true
  selector:
    matchLabels:
      app.kubernetes.io/name: traefik