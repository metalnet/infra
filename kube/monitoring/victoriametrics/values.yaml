nameOverride: vmks
defaultDashboards:
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
    
victoria-metrics-operator:
  operator:
    prometheus_converter_add_argocd_ignore_annotations: true
  enable_converter_ownership: false
    
vmsingle:
  server:
    persistentVolume:
      extraLabels:
        velero.io/exclude-from-backup: true

vlsingle:
  enabled: true
  server:
    persistentVolume:
      extraLabels:
        velero.io/exclude-from-backup: true
  spec:
    retentionPeriod: 30d
    storage:
      resources:
        requests:
          storage: 30Gi
          
vlagent:
  enabled: true
  spec:
    k8sCollector:
      enabled: true
      
grafana:
  persistence:
    enabled: true
    size: 10Gi
  extraVolumeMounts:
    - name: grafana-plugins-volume
      mountPath: /var/lib/grafana/plugins
      readOnly: false
  extraVolumes:
  - name: grafana-plugins-volume
    existingClaim: grafana-plugins-pvc
  plugins:
    - victoriametrics-logs-datasource
