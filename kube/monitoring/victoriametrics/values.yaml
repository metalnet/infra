nameOverride: vmks
defaultDashboards:
  annotations:
    argocd.argoproj.io/sync-options: ServerSideApply=true
    
victoria-metrics-operator:
  operator:
    prometheus_converter_add_argocd_ignore_annotations: true
  enable_converter_ownership: false
    
vmsingle:
  spec:
    persitentVolume:
      extraLabels:
        velero.io/exclude-from-backup: true
        
vlsingle:
  enabled: true
  spec:
    retentionPeriod: 30d
    persistentVolume:
      extraLabels:
        velero.io/exclude-from-backup: true
    storage:
      resources:
        requests:
          storage: 30Gi
          
vlagent:
  enabled: true
  spec:
    k8sCollector:
      enabled: true
      
grafana:
  persistence:
    enabled: true
    size: 10Gi
  plugins:
    - victoriametrics-logs-datasource
