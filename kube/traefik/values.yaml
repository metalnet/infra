ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`traefik.kube.metalnet.org`)
    entryPoints:
      - web
providers:
  kubernetesGateway:
    enabled: true
gateway:
  listeners:
    web:
      namespacePolicy:
        from: All

    websecure:
      namespacePolicy:
        from: All
