ingressClass:
  enabled: false
experimental:
  kubernetesGateway:
    enabled: true
api:
  insecure: true
providers:
  kubernetesIngress:
    enabled: false
  kubernetesCRD:
    allowExternalNameServices: true
  kubernetesGateway:
    enabled: true
    experimentalChannel: true
  file:
    enabled: true
    content:
      http:
        serversTransports:
          insecuretransport:
            insecureSkipVerify: true
        routers:
          ipmi:
            entryPoints:
              - web
            rule: Host(`ipmi.kube.metalnet.org`) || Host(`ipmi`)
            service: ipmi
        services:
          ipmi:
            loadBalancer:
              serversTransport: insecuretransport
              servers:
                - url: https://ipmi.metalnet.org
gateway:
  enabled: false

